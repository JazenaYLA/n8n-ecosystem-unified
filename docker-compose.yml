# =============================================================
# n8n-ecosystem-unified
# Proxmox LXC homelab edition
#
# DATABASE: infra-postgres on CTI LXC (threatlabs-cti-stack)
#   Set CTI_LXC_IP in .env
#
# This compose file contains ONLY n8n stack services.
# SearXNG runs as a separate Dockge stack (docs/SEARXNG_SETUP.md)
# Flowise runs in its own LXC via helper script (docs/FLOWISE_SETUP.md)
# =============================================================

services:

  # ── n8n ─────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      # Core
      - N8N_HOST=${N8N_HOST:-n8n.lab.local}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n.lab.local}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=${TIMEZONE:-America/Chicago}
      - N8N_LOG_LEVEL=info
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_METRICS=true
      - N8N_AI_ENABLED=true
      # Database — infra-postgres on CTI LXC
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${CTI_LXC_IP}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      # Execution settings
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - unified-net

  # ── Email Bridge (IMAP/SMTP REST microservice) ──────────────
  email-bridge:
    build: ./email-bridge
    container_name: email-bridge
    restart: unless-stopped
    expose:
      - "3100"
    networks:
      - unified-net

  # ── Crawl4AI (URL -> clean markdown for n8n Web Reader) ─────
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: "2g"
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - unified-net

volumes:
  n8n_data:

networks:
  unified-net:
    driver: bridge
